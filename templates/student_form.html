{% extends 'base.html' %}
{% block title %}{% if student %}Edit{% else %}Add{% endif %} Student{% endblock %}
{% block content %}
<div class="page-header">
    <div class="page-title">👤 <span>{% if student %}Edit{% else %}Add{% endif %} Student</span></div>
    <a href="{{ url_for('students') }}" class="btn btn-outline">← Back</a>
</div>

<div class="form-card">
    <form method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" value="{{ student.name if student else '' }}" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ student.email if student else '' }}" required>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone" value="{{ student.phone if student else '' }}">
            </div>
            <div class="form-group">
                <label>Branch / Department</label>
                <input type="text" name="branch" value="{{ student.branch if student else '' }}" required>
            </div>
            <div class="form-group">
                <label>Year</label>
                <select name="year">
                    {% for y in [1,2,3,4] %}
                    <option value="{{ y }}" {% if student and student.year == y %}selected{% endif %}>Year {{ y }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>CGPA</label>
                <input type="number" step="0.01" min="0" max="10" name="cgpa" value="{{ student.cgpa if student else '' }}">
            </div>
            <div class="form-group full">
                <label>Skills (comma separated)</label>
                <input type="text" name="skills" value="{{ student.skills if student else '' }}" placeholder="Python, Java, MySQL...">
            </div>
            <div class="form-group full">
                <label>Resume Link (Google Drive / LinkedIn)</label>
                <input type="url" name="resume_link" value="{{ student.resume_link if student else '' }}" placeholder="https://...">
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">{% if student %}Update{% else %}Add{% endif %} Student</button>
            <a href="{{ url_for('students') }}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
