{% extends 'base.html' %}
{% block title %}Add Application{% endblock %}
{% block content %}
<div class="page-header">
    <div class="page-title">📋 <span>Add Application</span></div>
    <a href="{{ url_for('applications') }}" class="btn btn-outline">← Back</a>
</div>
<div class="form-card">
    <form method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label>Student</label>
                <select name="student_id" required>
                    <option value="">Select Student</option>
                    {% for s in students %}
                    <option value="{{ s.id }}">{{ s.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Job Posting</label>
                <select name="job_id" required>
                    <option value="">Select Job</option>
                    {% for j in jobs %}
                    <option value="{{ j.id }}">{{ j.company_name }} – {{ j.title }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Add Application</button>
            <a href="{{ url_for('applications') }}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
