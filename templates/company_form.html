{% extends 'base.html' %}
{% block title %}{% if company %}Edit{% else %}Add{% endif %} Company{% endblock %}
{% block content %}
<div class="page-header">
    <div class="page-title">🏢 <span>{% if company %}Edit{% else %}Add{% endif %} Company</span></div>
    <a href="{{ url_for('companies') }}" class="btn btn-outline">← Back</a>
</div>
<div class="form-card">
    <form method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label>Company Name</label>
                <input type="text" name="name" value="{{ company.name if company else '' }}" required>
            </div>
            <div class="form-group">
                <label>Industry</label>
                <input type="text" name="industry" value="{{ company.industry if company else '' }}">
            </div>
            <div class="form-group">
                <label>Website</label>
                <input type="url" name="website" value="{{ company.website if company else '' }}" placeholder="https://...">
            </div>
            <div class="form-group">
                <label>Location</label>
                <input type="text" name="location" value="{{ company.location if company else '' }}">
            </div>
            <div class="form-group">
                <label>Contact Person</label>
                <input type="text" name="contact_person" value="{{ company.contact_person if company else '' }}">
            </div>
            <div class="form-group">
                <label>Contact Email</label>
                <input type="email" name="contact_email" value="{{ company.contact_email if company else '' }}">
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">{% if company %}Update{% else %}Add{% endif %} Company</button>
            <a href="{{ url_for('companies') }}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
